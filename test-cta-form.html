<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Form WhatsApp Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        .test-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .whatsapp-url {
            background: #25D366;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }

        .success {
            color: #25D366;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>CTA Form WhatsApp Integration Test</h1>

    <div class="test-section">
        <h2>Test Case: Form Data to WhatsApp</h2>

        <p><strong>Phone Number:</strong> 9205731999</p>

        <h3>Sample Form Data:</h3>
        <ul>
            <li>Full Name: John Doe</li>
            <li>Phone: +1234567890</li>
            <li>Email: john@example.com</li>
            <li>Business Name: Example Corp</li>
            <li>Service Needed: Web Development</li>
        </ul>

        <h3>Generated WhatsApp URL:</h3>
        <div class="whatsapp-url" id="whatsappUrl"></div>

        <button onclick="testWhatsApp()">Test WhatsApp Integration</button>
        <p id="testResult" class="success"></p>
    </div>

    <script>
        function testWhatsApp() {
            // Sample form data
            const formData = {
                fullName: "John Doe",
                phone: "+1234567890",
                email: "john@example.com",
                businessName: "Example Corp",
                serviceNeeded: "Web Development"
            };

            // Format the message exactly as the component does
            const message = `*New Application Submission*\n\n` +
                `*Name:* ${formData.fullName}\n` +
                `*Phone:* ${formData.phone}\n` +
                `*Email:* ${formData.email || "Not provided"}\n` +
                `*Business/Company Name:* ${formData.businessName}\n` +
                `*Service Needed:* ${formData.serviceNeeded}\n\n` +
                `*Submitted via VD Infotech Website*`;

            // Encode the message for URL
            const encodedMessage = encodeURIComponent(message);

            // Create WhatsApp URL with the phone number
            const whatsappUrl = `https://wa.me/9205731999?text=${encodedMessage}`;

            // Display the URL
            document.getElementById('whatsappUrl').textContent = whatsappUrl;

            // Test the URL encoding
            const decodedMessage = decodeURIComponent(encodedMessage);
            const isValid = decodedMessage === message;

            if (isValid) {
                document.getElementById('testResult').textContent = '✓ WhatsApp integration test passed!';
                // Optionally open the URL
                // window.open(whatsappUrl, '_blank');
            } else {
                document.getElementById('testResult').textContent = '✗ Test failed - encoding mismatch';
            }
        }

        // Run test on load
        window.onload = testWhatsApp;
    </script>
</body>

</html>
